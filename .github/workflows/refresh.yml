name: Refresh crosswalk

on:
  schedule:
    - cron: '0 21 * * 0'   # Sunday 21:00 UTC = Monday 06:00 KST
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-fetch all companies from DART (ignores cache)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  DART_API_KEY: ${{ secrets.DART_API_KEY }}

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and dependencies
        run: |
          pip install uv
          uv sync --extra dev

      - name: Restore DART cache
        uses: actions/cache@v4
        with:
          path: data/raw/dart/
          key: dart-cache-${{ github.run_id }}
          restore-keys: |
            dart-cache-

      - name: Build crosswalk
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            uv run python src/build_crosswalk.py --force
          else
            uv run python src/build_crosswalk.py
          fi

      - name: Validate outputs
        run: uv run python src/validate.py

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Commit updated dist artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dist/
          git diff --staged --quiet || git commit -m "data: automated refresh $(date +%Y-%m-%d)"
          git push

      - name: Save DART cache
        if: always()
        uses: actions/cache@v4
        with:
          path: data/raw/dart/
          key: dart-cache-${{ github.run_id }}
